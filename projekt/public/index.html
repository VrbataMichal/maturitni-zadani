<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NŌTS — Poznámky</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">NŌ<span>TS</span></div>
  <div class="header-meta">Osobní poznámky</div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-top">
      <button class="btn-new" onclick="newNote()">
        <span>+</span> Nová poznámka
      </button>
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Hledat..." oninput="renderList()">
      </div>
    </div>
    <div class="notes-list" id="notesList"></div>
  </aside>

  <main class="editor-area" id="editorArea">
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">✦</div>
      <h2>Začni psát</h2>
      <p>Vyber poznámku nebo vytvoř novou</p>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
